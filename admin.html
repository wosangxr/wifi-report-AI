<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผู้ดูแลระบบ - WiFi Issues</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .admin-table th { background: rgba(0,0,0,0.02); font-weight: 600; color: var(--dark); }
        .admin-table tr:hover { background: rgba(255,255,255,0.5); }
        .badge { padding: 0.4rem 0.8rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; display: inline-block; }
        .badge-danger { background: #ffe4e6; color: #e11d48; border: 1px solid #fda4af; }
        .badge-warning { background: #fef3c7; color: #d97706; border: 1px solid #fcd34d; }
        .badge-success { background: #d1fae5; color: #059669; border: 1px solid #6ee7b7; }
        .nav-buttons { display: flex; gap: 1rem; }
        .btn-outline { border: 2px solid var(--primary); color: var(--primary); background: transparent; padding: 0.6rem 1.2rem; border-radius: 12px; cursor: pointer; text-decoration: none; font-weight: 600; transition: all 0.3s ease; display: flex; align-items: center; gap: 0.5rem; }
        .btn-outline:hover { background: var(--primary); color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(67, 97, 238, 0.2); }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; color: #d1d5db; }
    </style>
</head>

<body>
    <button id="globalThemeToggle" class="floating-theme-btn" title="เปลี่ยนธีม">
        <i class='bx bx-sun'></i>
    </button>
    <button id="floatingLogoutBtn" class="floating-theme-btn" style="top: 1.5rem; right: 1.5rem; bottom: auto; background: var(--danger); color: white; display: none; border-color: transparent; z-index: 1000;" title="ออกจากระบบ">
        <i class='bx bx-log-out'></i>
    </button>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Admin Login Section -->
    <div id="adminLoginContainer" class="login-container">
        <div class="glass-card login-card">
            <div class="login-header">
                <div class="header-icon mx-auto" style="margin: 0 auto 1.5rem; background: linear-gradient(135deg, var(--danger), var(--warning));">
                    <i class='bx bx-shield-quarter'></i>
                </div>
                <h2 style="justify-content: center; margin-bottom: 0.5rem;">สำหรับผู้ดูแลระบบ</h2>
                <p>เข้าสู่ระบบจัดการปัญหา WiFi</p>
            </div>
            <form id="adminLoginForm" autocomplete="off">
                <div class="input-group">
                    <label for="adminUsername">รหัสผู้ดูแลระบบ</label>
                    <div class="input-icon">
                        <i class='bx bx-user'></i>
                        <input type="text" id="adminUsername" placeholder="กรอกรหัสแอดมิน" autocomplete="off" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="adminPassword">รหัสผ่าน</label>
                    <div class="input-icon">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="adminPassword" placeholder="กรอกรหัสผ่าน" autocomplete="new-password" required>
                    </div>
                </div>
                <button type="submit" class="submit-btn login-btn" style="background: linear-gradient(135deg, var(--danger), var(--warning));">
                    <span>เข้าสู่ระบบ</span>
                    <i class='bx bx-log-in-circle'></i>
                </button>
                <div style="text-align: center; margin-top: 1.5rem; width: 100%;">
                    <a href="index.html" class="admin-login-btn">กลับไปหน้า USER</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Admin Dashboard -->
    <div id="adminAppContainer" class="container" style="display: none;">
        <header class="app-header" style="flex-wrap: wrap; justify-content: space-between;">
            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <div class="header-icon" style="background: linear-gradient(135deg, var(--warning), var(--danger));">
                    <i class='bx bx-shield-quarter'></i>
                </div>
                <div class="header-text">
                    <h1>ผู้ดูแลระบบ</h1>
                    <p style="margin: 0;">รายการแจ้งปัญหา (เรียลไทม์)</p>
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-top: 0.5rem;">
                <a href="index.html" class="submit-btn" style="background: white; color: var(--primary); border: 1px solid var(--primary); text-decoration: none; width: auto; padding: 0.5rem 1rem; font-size: 0.95rem;">
                    <i class='bx bx-left-arrow-alt'></i> กลับไปหน้ารายงาน
                </a>
                <button onclick="resetAllData()" class="submit-btn" style="background: white; color: var(--danger); border: 1px solid var(--danger); width: auto; padding: 0.5rem 1rem; font-size: 0.95rem;">
                    <i class='bx bx-trash'></i> ล้างข้อมูล
                </button>
                <button onclick="resetRanking()" class="submit-btn" style="width: auto; padding: 0.5rem 1rem; background: var(--danger); font-size: 0.95rem;">
                    <i class='bx bx-reset'></i> รีเซ็ตอันดับ
                </button>
            </div>
        </header>

        <main class="main-content" style="grid-template-columns: 1fr;">
            <section class="glass-card" style="margin-bottom: 1.5rem; background: linear-gradient(135deg, rgba(67, 97, 238, 0.1), rgba(76, 201, 240, 0.1)); border: 1px solid rgba(67, 97, 238, 0.3);">
                <h2 style="color: var(--primary); display: flex; align-items: center; gap: 0.5rem;"><i class='bx bx-brain'></i> AI วิเคราะห์ภาพรวมปัญหาอินเทอร์เน็ต</h2>
                <div id="aiSummaryContent" style="margin-top: 1rem; color: var(--text-main); line-height: 1.6;">
                    <i class='bx bx-loader-alt bx-spin'></i> กำลังให้ AI ประมวลผลข้อมูล...
                </div>
            </section>

            <section style="overflow-x: auto;">
                <h2 style="margin-bottom: 1.5rem; color: var(--dark);"><i class='bx bx-list-ul'></i> รายการปัญหาที่ได้รับแจ้ง</h2>
                <div id="issuesListContainer">
                    <!-- Content injected by JS -->
                </div>
            </section>
        </main>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const supabaseUrl = 'https://fvzcusbcleyytjnyzgib.supabase.co';
            const supabaseKey = 'sb_publishable_ZFBeEQ9zscxS-MNLwhSbZQ_KGgQJMHf';
            const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
            // --- Theme Logic ---
            const themes = ['light', 'dark', 'pink'];
            let currentThemeIndex = themes.indexOf(localStorage.getItem('wifi_theme') || 'light');
            if(currentThemeIndex === -1) currentThemeIndex = 0;

            function applyTheme() {
                const theme = themes[currentThemeIndex];
                if(theme === 'light') document.body.removeAttribute('data-theme');
                else document.body.setAttribute('data-theme', theme);
                localStorage.setItem('wifi_theme', theme);

                const icon = themeToggleBtn.querySelector('i');
                if(icon) {
                    icon.className = theme === 'light' ? 'bx bx-sun' : 
                                    theme === 'dark' ? 'bx bx-moon' : 'bx bx-infinite';
                }
            }
            
            const themeToggleBtn = document.getElementById('globalThemeToggle');
            applyTheme();
            
            if(themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    currentThemeIndex = (currentThemeIndex + 1) % themes.length;
                    applyTheme();
                });
            }

            const adminLoginForm = document.getElementById('adminLoginForm');
            const adminLoginContainer = document.getElementById('adminLoginContainer');
            const adminAppContainer = document.getElementById('adminAppContainer');

            adminLoginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const u = document.getElementById('adminUsername').value;
                const p = document.getElementById('adminPassword').value;

                if (u !== 'admin' || p !== '123456') {
                    alert('รหัสผู้ดูแลระบบหรือรหัสผ่านไม่ถูกต้อง');
                    return;
                }

                const btn = adminLoginForm.querySelector('.login-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<i class='bx bx-loader-alt bx-spin'></i> กำลังเข้าสู่ระบบ...`;
                btn.style.opacity = "0.8";
                btn.disabled = true;

                setTimeout(() => {
                    adminLoginContainer.classList.add('fade-out-up');
                    setTimeout(() => {
                        adminLoginContainer.style.display = 'none';
                        adminAppContainer.style.display = 'flex';
                        void adminAppContainer.offsetWidth; // trigger reflow
                        adminAppContainer.style.animation = 'fadeInUp 0.6s ease-out forwards';
                        document.getElementById('floatingLogoutBtn').style.display = 'flex';
                        
                        // Initial Render
                        renderTable();
                        
            // Auto refresh roughly every 30 seconds
            setInterval(renderTable, 30000);
                    }, 500);
                }, 800);
            });
            
            window.resetRanking = async function() {
                if(confirm('ยืนยันการเคลียร์อันดับหน้าเว็บให้กลับเป็น 0? (รายการแจ้งปัญหาด้านล่างจะยังคงอยู่ครบถ้วน)')) {
                    try {
                        const { error } = await supabaseClient
                            .from('wifi_reports')
                            .insert([{
                                username: 'SYSTEM',
                                location: 'SYSTEM_RESET',
                                room: '-',
                                problem: 'RESET',
                                signal_level: 0,
                                details: new Date().toISOString()
                            }]);
                        if (error) throw error;
                        alert('รีเซ็ตอันดับหน้าเว็ปกลับเป็น 0 เรียบร้อยแล้ว!');
                    } catch (error) {
                        console.error('Error resetting rank:', error);
                        alert('เกิดข้อผิดพลาดในการรีเซ็ตอันดับ');
                    }
                }
            };

            window.resetAllData = async function() {
                if(confirm('ยืนยันการเคลียร์รายการแจ้งปัญหาออกจากหน้านี้หรือไม่? (ข้อมูลจริงจะยังคงถูกเก็บไว้ในฐานข้อมูลอย่างปลอดภัย)')) {
                    try {
                        const { error } = await supabaseClient
                            .from('wifi_reports')
                            .update({ status: 'deleted' })
                            .neq('status', 'deleted');
                        
                        if (error) throw error;
                        alert('เคลียร์รายการแจ้งปัญหาออกจากหน้าจอแอดมินเรียบร้อยแล้ว');
                        renderTable();
                    } catch (error) {
                        console.error('Error clearing data from screen:', error);
                        alert('เกิดข้อผิดพลาดในการเคลียร์หน้าจอ');
                    }
                }
            };

            const listContainer = document.getElementById('issuesListContainer');
            
            async function renderTable() {
                try {
                    const { data: issues, error } = await supabaseClient
                        .from('wifi_reports')
                        .select('*')
                        .neq('status', 'deleted')
                        .order('created_at', { ascending: false });
                        
                    if (error) throw error;
                    
                    listContainer.innerHTML = '';
                    
                    if (issues.length === 0) {
                        listContainer.innerHTML = `
                            <div class="glass-card empty-state">
                                <i class='bx bx-check-shield'></i>
                                <h3>ยังไม่มีการแจ้งปัญหา</h3>
                                <p>ไม่มีข้อมูลการแจ้งในระบบ</p>
                            </div>`;
                        document.getElementById('aiSummaryContent').innerHTML = '<p>ระบบปกติดี ไม่มีปัญหาที่ถูกรายงาน</p>';
                        return;
                    }
                    
                    // Generate Mock AI Summary
                    const summaryDiv = document.getElementById('aiSummaryContent');
                    const issueCounts = {};
                    let weakSignals = 0;
                    issues.forEach(i => {
                        if (i.location !== 'SYSTEM_RESET') {
                            issueCounts[i.location] = (issueCounts[i.location] || 0) + 1;
                            if (parseInt(i.signal_level) <= 2) weakSignals++;
                        }
                    });
                    const locationsList = Object.keys(issueCounts);
                    if (locationsList.length > 0) {
                        const topLoc = locationsList.sort((a,b) => issueCounts[b] - issueCounts[a])[0];
                        setTimeout(() => {
                            summaryDiv.innerHTML = `
                                <p><strong>สรุปผลจาก AI:</strong> จากการวิเคราะห์รูปภาพสัญญาณและข้อมูลพบว่า <strong>${topLoc}</strong> มีการแจ้งปัญหามากที่สุด (${issueCounts[topLoc]} ครั้ง) และพบว่ามีผู้ใช้ถึง ${weakSignals} รายที่ระดับสัญญาณต่ำกว่าเกณฑ์ AI แนะนำให้ทีม IT เข้าตรวจสอบ Access Point ด่วน</p>
                            `;
                        }, 1500);
                    } else {
                        summaryDiv.innerHTML = '<p>ระบบปกติดี ไม่มีปัญหาที่ถูกรายงาน</p>';
                    }
                    
                    issues.forEach(issue => {
                        if (issue.location === 'SYSTEM_RESET') return;
                        let badgeClass = 'badge-success';
                        const signal = parseInt(issue.signal_level || issue.signal);
                        if (signal <= 2) badgeClass = 'badge-danger';
                        else if (signal == 3) badgeClass = 'badge-warning';

                        let problemIcon = "<i class='bx bx-error-alt'></i>";
                        if(issue.problem === "เน็ตช้า") problemIcon = "<i class='bx bx-loader-circle'></i>";
                        else if (issue.problem === "เน็ตใช้ไม่ได้") problemIcon = "<i class='bx bx-wifi-off'></i>";

                        const status = issue.status || 'pending';
                        const statusColor = status === 'resolved' ? '#059669' : '#d97706';
                        const statusBg = status === 'resolved' ? '#d1fae5' : '#fef3c7';
                        const statusText = status === 'resolved' ? 'แก้ไขแล้ว' : 'กำลังดำเนินการ';

                        const card = document.createElement('div');
                        card.className = 'glass-card';
                        card.style.animation = "fadeIn 0.5s ease-out backwards";
                        card.style.marginBottom = "1.5rem";
                        card.style.display = "flex";
                        card.style.justifyContent = "space-between";
                        card.style.alignItems = "flex-start";
                        card.style.flexWrap = "wrap";
                        card.style.gap = "1rem";
                        
                        card.innerHTML = `
                            <div style="flex: 1; min-width: 250px;">
                                <h3 style="margin-bottom: 0.5rem; color: var(--dark); font-size: 1.3rem;">
                                    ${issue.location} 
                                    <span class="badge ${badgeClass}" style="margin-left: 0.5rem;">${signal} ขีด</span>
                                </h3>
                                <p style="color: var(--text-main); font-weight: 500; font-size: 1.05rem; margin-bottom: 0.5rem;">${problemIcon} ${issue.problem}</p>
                                <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 0.3rem;"><i class='bx bx-user'></i> ผู้แจ้ง: ${issue.username || 'ไม่ระบุ'}</p>
                                <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 0.5rem;"><i class='bx bx-door-open'></i> พิกัด: ${issue.room}</p>
                                <div style="background: rgba(0,0,0,0.03); padding: 0.8rem; border-radius: 10px; margin-bottom: 0.5rem;">
                                    <span style="font-size: 0.9rem; font-weight: 600; color: var(--dark);">รายละเอียด:</span>
                                    <p style="font-size: 0.95rem; color: var(--text-main); margin-top: 0.2rem;">${issue.details}</p>
                                </div>
                                ${issue.image_url ? `<div style="margin-bottom: 1rem;"><span style="font-size: 0.9rem; font-weight: 600; color: var(--dark); display:block; margin-bottom: 0.5rem;">ภาพถ่ายสัญญาณ:</span><a href="${issue.image_url}" target="_blank"><img src="${issue.image_url}" alt="Signal Image" style="max-width: 100%; max-height: 200px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); object-fit: contain;" /></a></div>` : ''}
                                <p style="font-size: 0.8rem; color: var(--text-muted);"><i class='bx bx-time'></i> ${new Date(issue.created_at).toLocaleString('th-TH')}</p>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.8rem; min-width: 160px;">
                                <div class="badge" style="background: ${statusBg}; color: ${statusColor}; text-align: center; border: 1px solid ${statusColor}; width: 100%; font-size: 0.95rem; padding: 0.6rem;">
                                    <i class='bx bx-loader-circle'></i> ${statusText}
                                </div>
                                <button class="btn-outline toggle-status" data-id="${issue.id}" data-status="${status}" style="width: 100%; justify-content: center; background: ${status === 'resolved' ? 'var(--warning)' : 'var(--success)'}; color: white; border-color: transparent;">
                                    <i class='bx ${status === 'resolved' ? 'bx-time' : 'bx-check-circle'}'></i> ${status === 'resolved' ? 'ดำเนินการซ้ำ' : 'แก้ไขแล้ว'}
                                </button>
                                <button class="btn-outline delete-issue" data-id="${issue.id}" style="width: 100%; justify-content: center; background: var(--danger); color: white; border-color: transparent;">
                                    <i class='bx bx-trash'></i> ลบข้อมูล
                                </button>
                            </div>
                        `;
                        listContainer.appendChild(card);
                    });

                    // Attach event listeners
                    document.querySelectorAll('.toggle-status').forEach(btn => {
                        btn.onclick = async (e) => {
                            const id = e.currentTarget.getAttribute('data-id');
                            const currentStatus = e.currentTarget.getAttribute('data-status');
                            const newStatus = currentStatus === 'resolved' ? 'pending' : 'resolved';
                            
                            await supabaseClient
                                .from('wifi_reports')
                                .update({ status: newStatus })
                                .eq('id', id);
                            renderTable();
                        };
                    });

                    document.querySelectorAll('.delete-issue').forEach(btn => {
                        btn.onclick = async (e) => {
                            const id = e.currentTarget.getAttribute('data-id');
                            if(confirm('ต้องการซ่อนปัญหานี้ออกจากหน้าจอแอดมิน (ข้อมูลในระบบยังมีอยู่) หรือไม่?')) {
                                await supabaseClient
                                    .from('wifi_reports')
                                    .update({ status: 'deleted' })
                                    .eq('id', id);
                                renderTable();
                            }
                        };
                    });
                } catch (err) {
                    console.error('Render error:', err);
                }
            }



            document.getElementById('floatingLogoutBtn').addEventListener('click', () => {
                if(confirm('ต้องการออกจากระบบผู้ดูแลหรือไม่?')) {
                    // Hide dashboard and logout button
                    adminAppContainer.style.display = 'none';
                    document.getElementById('floatingLogoutBtn').style.display = 'none';
                    
                    // Show login container smoothly
                    adminLoginContainer.classList.remove('fade-out-up');
                    adminLoginContainer.style.display = 'flex';
                    adminLoginContainer.style.animation = 'fadeIn 0.6s ease-out forwards';
                    
                    // Reset login form state
                    document.getElementById('adminUsername').value = '';
                    document.getElementById('adminPassword').value = '';
                    const btn = adminLoginForm.querySelector('.login-btn');
                    btn.innerHTML = `<span>เข้าสู่ระบบ</span><i class='bx bx-log-in-circle'></i>`;
                    btn.disabled = false;
                    btn.style.opacity = "1";
                }
            });
        });
    </script>
</body>
</html>
